# 1. The Deployment: Tells the EKS nodes how to run your Docker container

apiVersion: apps/v1
kind: Deployment
metadata:
  name: threat-detection-app
spec:
  replicas: 2 # Runs two copies of your app simultaneously for High Availability
  selector:
    matchLabels:
      app: threat-detection
  template:
    metadata:
      labels:
        app: threat-detection
    spec:
      containers:
      - name: threat-detection
        # Points directly to the ECR registry we built earlier
        image: 084000526807.dkr.ecr.eu-west-1.amazonaws.com/threat-detection-app:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 7777

        # SNYK-CC-K8S-4 / SNYK-CC-K8S-5: Set CPU and memory limits
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"

        # SNYK-CC-K8S-41: Liveness probe so Kubernetes can restart unhealthy pods
        livenessProbe:
          httpGet:
            path: /health
            port: 7777
          initialDelaySeconds: 15
          periodSeconds: 20
          failureThreshold: 3

        securityContext:
          # SNYK-CC-K8S-8: Prevent writes to the root filesystem
          readOnlyRootFilesystem: true
          # SNYK-CC-K8S-9: Disallow privilege escalation
          allowPrivilegeEscalation: false
          # SNYK-CC-K8S-10 / SNYK-CC-K8S-11: Run as a non-root user with a fixed UID
          runAsNonRoot: true
          runAsUser: 1000
          # SNYK-CC-K8S-6: Drop all Linux capabilities
          capabilities:
            drop:
              - ALL

---
# 2. The Service: Commands AWS to build a Load Balancer so the public can reach the app

apiVersion: v1
kind: Service
metadata:
  name: threat-detection-service
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb" # Provisions a blazing-fast AWS Network Load Balancer
spec:
  selector:
    app: threat-detection
  ports:
    - protocol: TCP
      port: 80
      targetPort: 7777
  type: LoadBalancer
  # SNYK-CC-K8S-15: Restrict ingress to known CIDR ranges (update as needed)
  loadBalancerSourceRanges:
    - "10.0.0.0/8"       # Internal VPC traffic
    - "0.0.0.0/0"        # TODO: Replace with your organisation's public IPs to fully lock this down